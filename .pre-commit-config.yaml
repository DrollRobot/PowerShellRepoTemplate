# TEMPLATE SETUP NOTES -- remove this block - FIXME
# =============================================================================
# This .pre-commit-config.yaml is part of PowershellRepoTemplate, a starter
# repo scaffold. pre-commit runs a suite of checks automatically on every
# git commit, catching hygiene issues and accidentally committed secrets
# before they reach the repo.
#
# pre-commit itself is a Python tool (the hooks below are language-agnostic).
# Install it once per machine with pipx, uv, or pip:
#   pipx install pre-commit detect-secrets
#
# First-time setup (run once after cloning):
#   pre-commit install              # install the git hook
#   pre-commit run --all-files      # optional: check existing files now
#   detect-secrets scan > .secrets.baseline   # create the secrets baseline
#
# To keep hook versions current:
#   pre-commit autoupdate           # bump all rev: pins to latest
#
# Hooks included in this config:
#   pre-commit-hooks  -- trailing whitespace, EOF newline, YAML syntax,
#                        large file guard, merge conflict markers
#   detect-secrets    -- prevents secrets from being committed; requires the
#                        .secrets.baseline file created above
#   local (pwsh)      -- the fast Tests\Test-*.ps1 formatting/lint checks, run
#                        against staged .ps1/.psm1/.psd1 files. Requires
#                        PowerShell 7+ (pwsh) on PATH.
#
# PSScriptAnalyzer (Tests.ps1 PSSA) is intentionally NOT run here -- it is too
# slow for a commit hook. CI covers it. The auto-fixers (AutoFormat /
# Format-TrailingWhitespace) are also excluded: trailing whitespace is already
# handled by the trailing-whitespace hook above, and a commit hook should
# report, not rewrite, your staged files.
# =============================================================================

repos:
  # Generic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # detect-secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  # PowerShell formatting / lint checks (fast, pure-text). Each runs against the
  # staged .ps1/.psm1/.psd1 files pre-commit passes in and exits nonzero on a
  # finding, blocking the commit. PSSA is excluded here (too slow; CI covers it).
  - repo: local
    hooks:
      - id: ps-module-syntax
        name: PowerShell syntax
        entry: pwsh -NoProfile -File Tests/Test-ModuleSyntax.ps1
        language: system
        files: \.(ps1|psm1|psd1)$
      - id: ps-line-length
        name: PowerShell line length
        entry: pwsh -NoProfile -File Tests/Test-LineLength.ps1
        language: system
        files: \.(ps1|psm1|psd1)$
      - id: ps-backtick-continuation
        name: PowerShell backtick continuation
        entry: pwsh -NoProfile -File Tests/Test-BacktickContinuation.ps1
        language: system
        files: \.(ps1|psm1|psd1)$
      - id: ps-format-operator
        name: PowerShell -f format operator
        entry: pwsh -NoProfile -File Tests/Test-FormatOperator.ps1
        language: system
        files: \.(ps1|psm1|psd1)$
      - id: ps-join-path
        name: PowerShell path-building
        entry: pwsh -NoProfile -File Tests/Test-JoinPath.ps1
        language: system
        files: \.(ps1|psm1|psd1)$
      - id: ps-non-ascii
        name: PowerShell non-ASCII characters
        entry: pwsh -NoProfile -File Tests/Test-NonASCIICharacters.ps1
        language: system
        files: \.(ps1|psm1|psd1)$
      - id: ps-write-verbose-debug
        name: PowerShell Write-Verbose/Write-Debug
        entry: pwsh -NoProfile -File Tests/Test-WriteVerboseDebug.ps1
        language: system
        files: \.(ps1|psm1|psd1)$