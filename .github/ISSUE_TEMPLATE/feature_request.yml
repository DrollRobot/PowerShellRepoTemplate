# =============================================================================
# TEMPLATE SETUP NOTES -- remove this block - FIXME
# =============================================================================
# This feature_request.yml is part of PowershellRepoTemplate, a starter repo
# scaffold.
#
# Purpose: Defines a structured GitHub issue form for feature requests.
# Prompts contributors to explain the problem they are solving and the
# alternatives they have already considered, which makes triage much easier.
#
# No customization is required for most projects.
# =============================================================================

name: Feature request
description: Suggest a new enhancement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please search existing issues before opening a new one.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do that is currently difficult or impossible?
      placeholder: ""
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches have you tried?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
