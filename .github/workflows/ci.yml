# =============================================================================
# TEMPLATE SETUP NOTES -- remove this block - FIXME
# =============================================================================
# This ci.yml is part of PowershellRepoTemplate, a starter repo scaffold.
#
# Purpose: Runs on every push and pull request to main. Blocks merges if
# syntax checks or NotLive Pester tests fail. Live tests (tagged 'live') and
# Destructive tests (tagged 'destructive') are intentionally excluded: Live
# needs credentials this runner does not have, and Destructive requires a
# host explicitly marked DISPOSABLE_ENVIRONMENT=1 (never a shared CI runner)
# or a remote target confirmed disposable. Run them separately if needed.
#
# All steps gate: the formatting/lint checks and PSSA exit nonzero on findings,
# and the Pester step exits nonzero on test failures (via Tests.ps1). This is
# the same check set that runs locally in the pre-commit hooks, minus PSSA
# (too slow for a commit hook, so it runs in CI only).
#
# GitHub setup (one-time, to make CI actually block merges):
#   1. Push this file to your repo so the workflow runs at least once.
#   2. Go to Settings -> Branches -> Add branch protection rule.
#   3. Set the pattern to: main
#   4. Enable "Require status checks to pass before merging".
#   5. Search for and add the "check" job (the job name from this file).
#   6. Optionally enable "Require branches to be up to date before merging".
#   7. Save the rule.
#
# Without branch protection, CI will still run and report pass/fail, but
# it will not prevent merging a failing PR.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Scan for secrets
        shell: pwsh
        run: |
          pip install detect-secrets==1.5.0
          detect-secrets-hook --baseline .secrets.baseline @(git ls-files)

      - name: Install PowerShell modules
        shell: pwsh
        run: Install-Module Pester, PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Formatting and lint checks
        shell: pwsh
        run: >
          .\Tests.ps1
          ModuleSyntax LineLength BacktickContinuation FormatOperator JoinPath
          NonASCIICharacters WriteVerboseDebug -Quiet

      - name: PSScriptAnalyzer
        shell: pwsh
        run: .\Tests.ps1 PSSA -Quiet

      - name: NotLive Pester tests
        shell: pwsh
        run: .\Tests.ps1 NotLive
