site_name: M365 Incident Response Tools
site_description: PowerShell module for Microsoft 365 incident response investigations.
site_url: https://DrollRobot.github.io/M365IncidentResponseTools/
repo_url: https://github.com/DrollRobot/M365IncidentResponseTools
repo_name: DrollRobot/M365IncidentResponseTools

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Connect to M365: connect.md
  - Investigation: investigation.md
  - Remediation: remediation.md
  - Command Reference:
