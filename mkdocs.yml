# FIXME: replace site/repo values with your module's name and GitHub location.
site_name: PowershellRepoTemplate
site_description: FIXME one-line description of your module.
site_url: https://FIXME.github.io/FIXME/
repo_url: https://github.com/FIXME/FIXME
repo_name: FIXME/FIXME

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

# FIXME: add one entry per exported function as your module grows. Command
# pages under commands/ are generated by PlatyPS via Docs.ps1.
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Command Reference:
    - Get-Greeting: commands/Get-Greeting.md
